name: professor_avalia
description: "App para professores corrigirem provas de forma rápida — MVP com wizard step-by-step, scanner fake e dashboard."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- State Management ---
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # --- Navigation ---
  go_router: ^14.8.1

  # --- Network ---
  dio: ^5.8.0+1

  # --- Local Storage ---
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4

  # --- Models / Serialization ---
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # --- Images / Camera ---
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # --- Animations ---
  lottie: ^3.3.1

  # --- Fonts ---
  google_fonts: ^6.2.1

  # --- Utils ---
  connectivity_plus: ^6.1.4
  permission_handler: ^11.4.0
  path_provider: ^2.1.5
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # --- Code Generation ---
  # Nota: hive_generator omitido — conflito com source_gen (hive_generator usa ^1.0.0,
  # freezed exige ^2.0.0). Para o MVP, Hive é usado com Map<String, dynamic>
  # diretamente (YAGNI). Adapters tipados podem ser adicionados se migrar para Isar.
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.1
  freezed: ^2.5.8
  json_serializable: ^6.9.4

  # --- Testing ---
  mocktail: ^1.0.4

  # --- App Config ---
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

# ---------------------------------------------------------------------------
# flutter_launcher_icons config
# Coloque a arte em assets/icon/icon.png (mínimo 1024x1024px) e rode:
#   dart run flutter_launcher_icons
# ---------------------------------------------------------------------------
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  remove_alpha_ios: true

# ---------------------------------------------------------------------------
# flutter_native_splash config
# Rode: dart run flutter_native_splash:create
# ---------------------------------------------------------------------------
flutter_native_splash:
  color: "#1A1A2E"
  image: assets/splash/logo.png
  android_12:
    color: "#1A1A2E"
    icon_background_color: "#1A1A2E"
  web: false

flutter:
  uses-material-design: true

  assets:
    - assets/mock/
    - assets/icon/
    - assets/splash/
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
